<!DOCTYPE html>
<html>
<head>
  <title>Luxury Mobile Bartending</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #d4af37;
    }

    .card {
      background: #222;
      padding: 20px;
      margin: 20px auto;
      border-radius: 15px;
      max-width: 400px;
    }

    input, select, textarea, button {
      width: 90%;
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #d4af37;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Luxury Mobile Bartending</h1>
<p>Handcrafted Cocktails for every celebration</p>

<div class="card">
<h2>Drink Menu</h2>

<p>🍹 Paloma - Grapefruit, tequila, lime</p>
<p>🍸 Margarita - Tequila, lime, fresh citrus</p>


</div>

<div class="card">

<h2>Order Drinks</h2>

<input id="name" placeholder="Your Name">

<select id="drink">
  <option>Paloma</option>
  <option>Margarita</option>
  <option>Old Fashioned</option>
  <option>Mojito</option>
</select>

<textarea id="notes" placeholder="Notes (extra lime, less ice, etc.)"></textarea>

<button onclick="sendOrder()">Place Order</button>

<p id="message"></p>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {
  apiKey: "AIzaSyAXy7rKSkKqNxoJmyQcmGojsqmMHNYRk_g",
  authDomain: "bar-orders-747e2.firebaseapp.com",
  databaseURL: "https://bar-orders-747e2-default-rtdb.firebaseio.com",
  projectId: "bar-orders-747e2",
  storageBucket: "bar-orders-747e2.firebasestorage.app",
  messagingSenderId: "278382423353",
  appId: "1:278382423353:web:55c809a236b0099487cce8"
};


const app = initializeApp(firebaseConfig);
const database = getDatabase(app);


window.sendOrder = function() {

  let order = {
    name: document.getElementById("name").value,
    drink: document.getElementById("drink").value,
    notes: document.getElementById("notes").value
  };

  push(ref(database, "orders"), order);

  document.getElementById("message").innerHTML = "Order sent!";
};

</script>


</body>
</html>
